name: Actualizar IBR historico

on:
  schedule:
    # Lunes a viernes a las 22:00 UTC (fin del dia habil)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests playwright openpyxl xlrd

      - name: Instalar browser
        run: python -m playwright install chromium

      - name: Actualizar IBR
        run: python scraper_ibr_hist.py

      - name: Commit datos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos_ibr.json
          git diff --staged --quiet || git commit -m "auto: datos IBR $(date +'%Y-%m-%d')"
          git push
