name: Actualizar Noticias

on:
  schedule:
    # 7am, 11am, 3pm, 7pm Colombia (UTC-5) = 12, 16, 20, 00 UTC
    - cron: '0 12 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 20 * * 1-5'
    - cron: '0 0  * * 2-6'
  workflow_dispatch:

jobs:
  update-noticias:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr scraper noticias
        run: python scraper_noticias.py

      - name: Mostrar resultado
        run: cat noticias_data.json | python -c "import sys,json; d=json.load(sys.stdin); [print(f'  [{a[\"source\"]}] {a[\"title\"][:70]}') for a in d['articles']]"

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias_data.json
          git diff --staged --quiet || git commit -m "auto: noticias_data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
