name: Actualizar UVR historico

on:
  schedule:
    # Alrededor del dia 15 de cada mes a las 12:00 UTC (BanRep publica UVR mensualmente)
    - cron: '0 12 15,16,17 * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests playwright openpyxl xlrd

      - name: Instalar browser
        run: python -m playwright install chromium

      - name: Actualizar UVR
        run: python scraper_uvr_hist.py

      - name: Commit datos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos_uvr.json
          git diff --staged --quiet || git commit -m "auto: datos UVR $(date +'%Y-%m-%d')"
          git push
