name: Actualizar FedWatch Data

on:
  schedule:
    # 9am y 5pm Colombia (UTC-5) = 14:00 y 22:00 UTC, lunes a viernes
    - cron: '0 14 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update-fedwatch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests playwright

      - name: Instalar Chromium (para fallback Playwright)
        run: playwright install --with-deps chromium
        continue-on-error: true

      - name: Correr scraper FedWatch
        run: python scraper_fedwatch.py

      - name: Mostrar resultado
        run: |
          echo "=== fedwatch_data.json ==="
          cat fedwatch_data.json || echo "(archivo no encontrado)"

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fedwatch_data.json
          git diff --staged --quiet || git commit -m "auto: fedwatch_data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
