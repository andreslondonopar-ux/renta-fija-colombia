name: Actualizar Market Data

on:
  schedule:
    # Cada 30 min de 8am a 5pm Colombia (UTC-5 = 13:00-22:00 UTC), lunes a viernes
    - cron: '0,30 13-21 * * 1-5'
    # Apertura mercados colombianos (9am COT)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  update-market:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python scraper_market.py

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          git diff --staged --quiet || git commit -m "auto: market_data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
