name: Actualizar Market Data

on:
  schedule:
    # Cada 5 minutos lunes a viernes (mínimo posible en GitHub Actions)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch:

jobs:
  update-market:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python scraper_market.py

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          git diff --staged --quiet || git commit -m "auto: market_data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
