name: Actualizar Macro Data

on:
  schedule:
    # 9am y 5pm Colombia (UTC-5) = 14:00 y 22:00 UTC, lunes a viernes
    - cron: '0 14 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update-macro:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Correr scraper macro
        run: python scraper_macro.py

      - name: Mostrar resultado
        run: |
          echo "=== macro_data.json ==="
          cat macro_data.json

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add macro_data.json
          if ! git diff --staged --quiet; then
            git commit -m "auto: macro_data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
