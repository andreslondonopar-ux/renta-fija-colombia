name: Actualizar Curva TES

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 openpyxl lxml playwright
      
      - name: Instalar browser
        run: python -m playwright install chromium

      - name: Descargar y procesar Excel SEN
        run: python scraper.py

      - name: Commit datos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos_curva.json
          git diff --staged --quiet || git commit -m "Actualizar curva TES $(date +'%Y-%m-%d')"
          git push
