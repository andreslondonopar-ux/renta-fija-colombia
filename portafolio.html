<script>
const $=id=>document.getElementById(id);
const fmt=(n,d=4)=>typeof n==='number'?n.toLocaleString('es-CO',{minimumFractionDigits:d,maximumFractionDigits:d}):'—';
const fmtP=n=>'$'+Math.round(n).toLocaleString('es-CO');
const fmtM=n=>{const a=Math.abs(n),s=n<0?'-':'';return a>=1e9?s+'$'+fmt(a/1e9,3)+' Bn':a>=1e6?s+'$'+fmt(a/1e6,2)+' MM':(n<0?'-':'')+fmtP(Math.abs(n));};
function fmtDate(iso){if(!iso)return'—';const p=iso.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso;}
function pct(n,d=2){return fmt(n,d)+'%';}

let MODE='aggregate', SELECTED_PF=null;

// ── STORAGE ───────────────────────────────────────────────────
function getStore(){try{return JSON.parse(localStorage.getItem('rf_pf_store')||'{"portfolios":[]}');}catch{return{portfolios:[]};}}
function setStore(s){localStorage.setItem('rf_pf_store',JSON.stringify(s));}
function getPending(){try{return JSON.parse(localStorage.getItem('rf_portfolio')||'[]');}catch{return[];}}

// ── PORTFOLIO MANAGEMENT ──────────────────────────────────────
function createPF(){
  const inp=$('new-pf-name'),name=inp.value.trim();
  if(!name){inp.focus();return;}
  const store=getStore();
  store.portfolios.push({id:Date.now(),name,bonds:[]});
  setStore(store);inp.value='';renderSidebar();
}
function deletePF(id){
  if(!confirm('¿Eliminar este portafolio?'))return;
  const store=getStore();
  store.portfolios=store.portfolios.filter(p=>p.id!==id);
  setStore(store);if(SELECTED_PF===id)SELECTED_PF=null;
  renderSidebar();$('main-content').innerHTML='<div class="empty" style="margin:auto;max-width:400px">Portafolio eliminado</div>';
}
function addToPF(pfId,bondId){
  const pending=getPending(),bond=pending.find(b=>b.id===bondId);if(!bond)return;
  const store=getStore(),pf=store.portfolios.find(p=>p.id===pfId);if(!pf)return;
  pf.bonds.push(bond);
  localStorage.setItem('rf_portfolio',JSON.stringify(pending.filter(b=>b.id!==bondId)));
  setStore(store);renderSidebar();
}
function removeBond(pfId,bondId){
  const store=getStore(),pf=store.portfolios.find(p=>p.id===pfId);
  if(pf)pf.bonds=pf.bonds.filter(b=>b.id!==bondId);
  setStore(store);renderSidebar();if(SELECTED_PF===pfId)analyze(pfId);
}
function clearAll(){
  if(!confirm('¿Limpiar todo?'))return;
  localStorage.removeItem('rf_pf_store');localStorage.removeItem('rf_portfolio');
  SELECTED_PF=null;renderSidebar();
  $('main-content').innerHTML='<div class="empty" style="margin:auto">Todo limpiado</div>';
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar(){
  const store=getStore(),pending=getPending();
  const total=store.portfolios.reduce((s,p)=>s+p.bonds.length,0)+pending.length;
  const cnt=$('total-count');if(cnt)cnt.textContent=total+' bono'+(total!==1?'s':'');
  let html='';

  if(pending.length){
    html+=`<div class="pf-group">
      <div class="pf-group-hdr"><span class="pf-group-name" style="color:var(--amber3)">⏳ Sin asignar (${pending.length})</span></div>
      <div class="pf-group-body">
        ${pending.map(b=>`<div class="bond-card">
          <div class="bond-type" style="background:${b.ac2||'#1a2540'};border-color:${b.ac||'#1e2d4a'};color:${b.ac3||'#e8eaf0'}">${b.tipo||'RF'}</div>
          <div class="bond-info">
            <div class="bond-label">${b.label||'Bono'}</div>
            <div class="bond-meta">${fmtDate(b.liq)} → ${fmtDate(b.venc)}</div>
            <div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">
              ${store.portfolios.map(pf=>`<button class="btn btn-ghost" style="padding:2px 6px;font-size:9px" onclick="addToPF(${pf.id},${b.id})">→ ${pf.name.slice(0,12)}</button>`).join('')}
            </div>
          </div>
        </div>`).join('')}
      </div></div>`;
  }

  store.portfolios.forEach(pf=>{
    const isSel=pf.id===SELECTED_PF;
    html+=`<div class="pf-group" style="border-color:${isSel?'var(--purple)':'var(--border)'}">
      <div class="pf-group-hdr" onclick="selectPF(${pf.id})" style="background:${isSel?'rgba(124,58,237,.15)':'var(--bg3)'}">
        <span class="pf-group-name" style="color:${isSel?'var(--purple3)':'var(--txt)'}">${pf.name}</span>
        <span class="pf-group-count">${pf.bonds.length} bono${pf.bonds.length!==1?'s':''}</span>
        <button class="btn btn-red" onclick="event.stopPropagation();deletePF(${pf.id})">✕</button>
      </div>
      <div class="pf-group-body">
        ${pf.bonds.map(b=>`<div class="bond-card">
          <div class="bond-type" style="background:${b.ac2||'#1a2540'};border-color:${b.ac||'#1e2d4a'};color:${b.ac3||'#e8eaf0'};width:28px;height:28px;font-size:8px">${b.tipo||'RF'}</div>
          <div class="bond-info">
            <div class="bond-label" style="font-size:10px">${b.label||'Bono'}</div>
            <div class="bond-meta">${b.dir==='short'?'<span style="color:var(--red3)">▼ CORTO</span>':'<span style="color:var(--green3)">▲ LARGO</span>'} · ${fmtM(b.nom||0)}</div>
          </div>
          <button class="btn btn-red" onclick="removeBond(${pf.id},${b.id})">✕</button>
        </div>`).join('')}
        ${!pf.bonds.length?'<div style="font-size:10px;color:var(--txt3);padding:4px">Sin bonos aún</div>':''}
        ${isSel&&pf.bonds.length?`<button class="btn btn-purple" style="width:100%;margin-top:6px" onclick="analyze(${pf.id})">▶ Analizar</button>`:''}
      </div></div>`;
  });

  if(!store.portfolios.length&&!pending.length){
    html='<div class="empty" style="padding:16px;font-size:11px">Crea un portafolio con el botón + arriba</div>';
  }
  $('sidebar-body').innerHTML=html;
}

function selectPF(id){SELECTED_PF=SELECTED_PF===id?null:id;renderSidebar();if(SELECTED_PF)analyze(SELECTED_PF);}
function setMode(m){MODE=m;document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));$('tab-'+m).classList.add('active');if(SELECTED_PF)analyze(SELECTED_PF);}
function analyze(pfId){
  const store=getStore(),pf=store.portfolios.find(p=>p.id===pfId);
  if(!pf||!pf.bonds.length){
    $('main-content').innerHTML='<div class="empty" style="margin:auto;max-width:400px"><div style="font-size:28px;margin-bottom:8px">📭</div><div style="font-size:11px">Sin bonos en este portafolio</div></div>';
    return;
  }
  if(MODE==='aggregate')renderAggregate(pf);
  else renderCompare(pf);
}

// ── HELPERS ───────────────────────────────────────────────────
// FIX: price ya viene como % (ej 96.05), NO dividir por 100 de nuevo
// P&G = (-dmod*(bp/10000) + 0.5*conv*(bp/10000)^2) * (price/100) * nom
function calcPG(b, bp){
  const sign = b.dir==='short' ? -1 : 1;
  const dmod = parseFloat(b.dmod) || 0;
  const conv = parseFloat(b.conv) || 0;
  const nom  = parseFloat(b.nom)  || 0;
  let price = parseFloat(b.priceRnd || b.price || 100);
  if(price < 2) price = price * 100;
  if(nom === 0 || dmod === 0) return 0;
  const pg = (-dmod*(bp/10000) + 0.5*conv*(bp/10000)**2) * (price/100) * nom;
  return pg * sign;
}
function signedDV01(b){return(b.dir==='short'?-1:1)*Math.abs(b.dv01||0);}
function isShortBond(b){
  if(!b.venc||!b.liq)return false;
  const days=(new Date(b.venc+'T12:00:00')-new Date(b.liq+'T12:00:00'))/86400000;
  return days<=3*365;
}

// ── AGGREGATE VIEW ────────────────────────────────────────────
function aggCalc(bonds){
  const tot=bonds.reduce((s,b)=>s+Math.abs(b.vGiro),0)||1;
  const totVGiro=bonds.reduce((s,b)=>s+(b.dir==='short'?-1:1)*b.vGiro,0);
  const totDV01net=bonds.reduce((s,b)=>s+signedDV01(b),0);
  const totDV01gross=bonds.reduce((s,b)=>s+Math.abs(b.dv01),0);
  const nLong=bonds.filter(b=>b.dir!=='short').length;
  const nShort=bonds.filter(b=>b.dir==='short').length;
  const wAvg=fn=>bonds.reduce((s,b)=>s+fn(b)*(Math.abs(b.vGiro)/tot),0);
  return{tot,totVGiro,totDV01net,totDV01gross,nLong,nShort,
    wDmod:wAvg(b=>b.dmod),wDmac:wAvg(b=>b.dmac),wConv:wAvg(b=>b.conv),
    wPrice:wAvg(b=>b.priceRnd),wIC:wAvg(b=>b.ic),wPL:wAvg(b=>b.pl),wCpPct:wAvg(b=>b.cpPct)};
}

function buildAggSummaryHTML(m,n){
  return`<div class="mg mg6" style="margin-bottom:10px">
    <div class="m" style="border-color:var(--purple)"><div class="m-lbl">Valor total (abs)</div><div class="m-val" style="color:var(--purple3);font-size:14px">${fmtM(m.tot)}</div><div class="m-unit">${n} posición${n!==1?'es':''}</div></div>
    <div class="m"><div class="m-lbl">Valor giro neto</div><div class="m-val" style="font-size:14px;color:${m.totVGiro>=0?'var(--green3)':'var(--red3)'}">${fmtM(m.totVGiro)}</div><div class="m-unit">largo − corto</div></div>
    <div class="m"><div class="m-lbl">DV01 neto</div><div class="m-val" style="font-size:14px;color:${m.totDV01net>=0?'var(--green3)':'var(--red3)'}">${(m.totDV01net>=0?'+':'')+fmtP(m.totDV01net)}</div><div class="m-unit">${m.totDV01net>0?'neto largo':m.totDV01net<0?'neto corto':'neutro'}</div></div>
    <div class="m"><div class="m-lbl">DV01 bruto</div><div class="m-val" style="font-size:14px">${fmtP(m.totDV01gross)}</div><div class="m-unit">exposición total</div></div>
    <div class="m"><div class="m-lbl">Posiciones</div><div class="m-val" style="font-size:14px"><span style="color:var(--green3)">${m.nLong}L</span> / <span style="color:var(--red3)">${m.nShort}C</span></div><div class="m-unit">largo / corto</div></div>
  </div>
  <div class="mg mg4">
    <div class="m"><div class="m-lbl">D. Macaulay pond.</div><div class="m-val">${fmt(m.wDmac,4)}</div><div class="m-unit">años</div></div>
    <div class="m"><div class="m-lbl">D. Modificada pond.</div><div class="m-val">${fmt(m.wDmod,4)}</div><div class="m-unit">pond. por valor</div></div>
    <div class="m"><div class="m-lbl">Convexidad pond.</div><div class="m-val">${fmt(m.wConv,4)}</div><div class="m-unit">—</div></div>
    <div class="m"><div class="m-lbl">Precio sucio pond.</div><div class="m-val">${pct(m.wPrice,4)}</div><div class="m-unit">% del par</div></div>
  </div>`;
}

function fmtAggNom(el){
  const n=parseInt((el.value||'').replace(/\./g,'').replace(/[^0-9]/g,''));
  el.value=isNaN(n)?'0':n.toLocaleString('es-CO',{maximumFractionDigits:0});
}

function recalcAggregate(){
  const bonds=window._aggBonds; if(!bonds) return;
  bonds.forEach((b,i)=>{
    const el=document.getElementById('agg-nom-'+i); if(!el) return;
    const _nr=parseInt((el.value||'').replace(/\./g,'').replace(/[^0-9]/g,''));
    const nomNew=isNaN(_nr)?b._effNomOrig:_nr;
    const scale=b._effNomOrig>0?nomNew/b._effNomOrig:1;
    b.nom=nomNew; b.vGiro=b._vGiroOrig*scale; b.dv01=b._dv01Orig*scale;
  });
  const m=aggCalc(bonds);
  const s=document.getElementById('agg-summary'); if(s) s.innerHTML=buildAggSummaryHTML(m,bonds.length);
  bonds.forEach((b,i)=>{
    const sdv01=signedDV01(b);
    const vgiroPct=m.tot>0?Math.abs(b.vGiro)/m.tot*100:0;
    const dv01pct=m.totDV01gross>0?Math.abs(b.dv01)/m.totDV01gross*100:0;
    const bar=`<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(vgiroPct,100).toFixed(1)}%;background:var(--purple)"></div></div><span style="font-size:9px;min-width:32px">${vgiroPct.toFixed(1)}%</span></div>`;
    const dbar=`<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(dv01pct,100).toFixed(1)}%;background:var(--amber)"></div></div><span style="font-size:9px;min-width:32px">${dv01pct.toFixed(1)}%</span></div>`;
    const vg=document.getElementById('agg-vg-'+i); if(vg) vg.textContent=fmtM(b.vGiro);
    const pc=document.getElementById('agg-pct-'+i); if(pc) pc.innerHTML=bar;
    const dv=document.getElementById('agg-dv01-'+i); if(dv){dv.textContent=(sdv01>=0?'+':'')+fmtP(sdv01);dv.style.color=sdv01>=0?'var(--green3)':'var(--red3)';}
    const dp=document.getElementById('agg-dp-'+i); if(dp) dp.innerHTML=dbar;
  });
  const tf=document.getElementById('agg-tfoot');
  if(tf) tf.innerHTML=`<tr>
    <td colspan="3" style="text-align:left">TOTAL PORTAFOLIO</td>
    <td>—</td><td>—</td><td>${pct(m.wCpPct,2)}</td>
    <td>${pct(m.wPrice,3)}</td><td>${pct(m.wPL,3)}</td><td>${pct(m.wIC,3)}</td>
    <td>—</td><td style="color:var(--purple3)">${fmtM(m.totVGiro)}</td><td>100%</td>
    <td>${fmt(m.wDmac,4)}</td><td>${fmt(m.wDmod,4)}</td><td>${fmt(m.wConv,4)}</td>
    <td style="color:${m.totDV01net>=0?'var(--green3)':'var(--red3)'}">${(m.totDV01net>=0?'+':'')+fmtP(m.totDV01net)}</td>
    <td>100%</td>
  </tr>`;
  if(typeof onEstSlider==='function') onEstSlider();
}

function resetAggNom(){
  const bonds=window._aggBonds; if(!bonds) return;
  bonds.forEach((b,i)=>{
    b.nom=b._nomOrig; b.vGiro=b._vGiroOrig; b.dv01=b._dv01Orig;
    const el=document.getElementById('agg-nom-'+i);
    if(el) el.value=b._effNomOrig.toLocaleString('es-CO',{maximumFractionDigits:0});
  });
  recalcAggregate();
}

function renderAggregate(pf){
  const bonds=pf.bonds.map(b=>({
    ...b,
    nom:      parseFloat(b.nom)      || 0,
    vGiro:    parseFloat(b.vGiro)    || 0,
    dmod:     parseFloat(b.dmod)     || 0,
    dmac:     parseFloat(b.dmac)     || 0,
    conv:     parseFloat(b.conv)     || 0,
    dv01:     parseFloat(b.dv01)     || 0,
    priceRnd: parseFloat(b.priceRnd) || 100,
    ic:       parseFloat(b.ic)       || 0,
    pl:       parseFloat(b.pl)       || 0,
    cpPct:    parseFloat(b.cpPct)    || 0,
    cupsRem:  parseFloat(b.cupsRem)  || 0,
  }));
  // Guardar originales para reset y escalado
  // _effNomOrig: nominal real si está guardado, sino derivado de vGiro/precio
  bonds.forEach(b=>{
    b._nomOrig=b.nom; b._vGiroOrig=b.vGiro; b._dv01Orig=b.dv01;
    b._effNomOrig=b.nom>0?b.nom:(b.priceRnd>0?Math.round(b.vGiro/(b.priceRnd/100)):0);
  });
  window._aggBonds=bonds;

  const m=aggCalc(bonds);
  const nomStyle='width:110px;padding:2px 5px;border:1px solid var(--border2);border-radius:var(--r);font-size:10px;color:var(--amber3);background:var(--bg2);font-family:monospace;text-align:right';

  const bondRows=bonds.map((b,i)=>{
    const sdv01=signedDV01(b);
    const dv01pct=m.totDV01gross>0?Math.abs(b.dv01)/m.totDV01gross*100:0;
    const vgiroPct=m.tot>0?Math.abs(b.vGiro)/m.tot*100:0;
    const isShort=b.dir==='short';
    return`<tr>
      <td><span class="tag" style="background:${b.ac2||'#1a2540'};color:${b.ac3||'#e8eaf0'};border-color:${b.ac||'#1e2d4a'}">${b.tipo||'RF'}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.label||'—'}</td>
      <td style="color:${isShort?'var(--red3)':'var(--green3)'}">${isShort?'▼ Corto':'▲ Largo'}</td>
      <td>${fmtDate(b.venc)}</td>
      <td>${b.cupsRem||'—'}</td>
      <td>${pct(b.cpPct||0,2)}</td>
      <td>${pct(b.priceRnd||0,4)}</td>
      <td>${pct(b.pl||0,4)}</td>
      <td>${pct(b.ic||0,4)}</td>
      <td><input id="agg-nom-${i}" type="text" value="${b._effNomOrig.toLocaleString('es-CO',{maximumFractionDigits:0})}" style="${nomStyle}" oninput="recalcAggregate()" onblur="fmtAggNom(this)" inputmode="numeric"></td>
      <td id="agg-vg-${i}">${fmtM(b.vGiro)}</td>
      <td id="agg-pct-${i}"><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(vgiroPct,100).toFixed(1)}%;background:var(--purple)"></div></div><span style="font-size:9px;min-width:32px">${vgiroPct.toFixed(1)}%</span></div></td>
      <td>${fmt(b.dmac||0,4)}</td>
      <td>${fmt(b.dmod||0,4)}</td>
      <td>${fmt(b.conv||0,4)}</td>
      <td id="agg-dv01-${i}" style="color:${sdv01>=0?'var(--green3)':'var(--red3)'}">${(sdv01>=0?'+':'')+fmtP(sdv01)}</td>
      <td id="agg-dp-${i}"><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(dv01pct,100).toFixed(1)}%;background:var(--amber)"></div></div><span style="font-size:9px;min-width:32px">${dv01pct.toFixed(1)}%</span></div></td>
    </tr>`;
  }).join('');

  $('main-content').innerHTML=`
    <div class="card">
      <div class="c-hdr">📊 ${pf.name} · Resumen del portafolio</div>
      <div class="c-body" id="agg-summary">${buildAggSummaryHTML(m,bonds.length)}</div>
    </div>

    <div class="card">
      <div class="c-hdr">Detalle de posiciones <span style="font-size:9px;color:var(--amber3);font-weight:400;margin-left:6px">· Nominal editable → métricas se actualizan en tiempo real</span>
        <button onclick="resetAggNom()" style="margin-left:auto;padding:3px 10px;font-size:9px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--txt3);cursor:pointer;font-family:inherit">↺ Reset</button>
      </div>
      <div class="c-body" style="padding:0">
        <div class="tscroll" style="max-height:300px;overflow-y:auto">
          <table class="ft">
            <thead><tr>
              <th style="text-align:left">Tipo</th>
              <th style="text-align:left">Bono</th>
              <th>Dir.</th><th>Vencimiento</th><th>Cups.</th>
              <th>T. Cupón</th><th>P. Sucio</th><th>P. Limpio</th><th>I. Corrido</th>
              <th style="min-width:120px;color:var(--amber3)">Nominal ($)</th>
              <th>Valor giro</th><th style="min-width:110px">% PF</th>
              <th>D. Mac</th><th>D. Mod</th><th>Convex.</th>
              <th>DV01 (±)</th><th style="min-width:110px">% DV01</th>
            </tr></thead>
            <tbody>${bondRows}</tbody>
            <tfoot id="agg-tfoot"><tr>
              <td colspan="3" style="text-align:left">TOTAL PORTAFOLIO</td>
              <td>—</td><td>—</td><td>${pct(m.wCpPct,2)}</td>
              <td>${pct(m.wPrice,3)}</td><td>${pct(m.wPL,3)}</td><td>${pct(m.wIC,3)}</td>
              <td>—</td><td style="color:var(--purple3)">${fmtM(m.totVGiro)}</td><td>100%</td>
              <td>${fmt(m.wDmac,4)}</td><td>${fmt(m.wDmod,4)}</td><td>${fmt(m.wConv,4)}</td>

  setTimeout(initEstrategiaChart, 50);

// ── COMPARE VIEW — fichas verticales lado a lado ───────────────
function renderCompare(pf){
  if(!pf.bonds.length)return;
  const bonds=pf.bonds.map(b=>({
    ...b,
    nom:      parseFloat(b.nom)      || 0,
    vGiro:    parseFloat(b.vGiro)    || 0,
    dmod:     parseFloat(b.dmod)     || 0,
    dmac:     parseFloat(b.dmac)     || 0,
    conv:     parseFloat(b.conv)     || 0,
    dv01:     parseFloat(b.dv01)     || 0,
    priceRnd: parseFloat(b.priceRnd) || 100,
    ic:       parseFloat(b.ic)       || 0,
    pl:       parseFloat(b.pl)       || 0,
    cpPct:    parseFloat(b.cpPct)    || 0,
    cupsRem:  parseFloat(b.cupsRem)  || 0,
    tirAvg:   parseFloat(b.tirAvg)   || 0,
  }));

  // Para cada métrica, encontrar el mejor y peor entre los bonos
  function bestIdx(fn,higher=true){
    let best=0;
    bonds.forEach((b,i)=>{if(higher?fn(b)>fn(bonds[best]):fn(b)<fn(bonds[best]))best=i;});
    return best;
  }
  const bestDmod=bestIdx(b=>b.dmod||0,true);
  const bestConv=bestIdx(b=>b.conv||0,true);
  const bestDV01=bestIdx(b=>Math.abs(b.dv01||0),true);
  const bestPrice=bestIdx(b=>b.priceRnd||0,true);
  const worstPrice=bestIdx(b=>b.priceRnd||0,false);
  const bestCups=bestIdx(b=>b.cupsRem||0,true);
  const bestIC=bestIdx(b=>b.ic||0,true);
  const bestCpPct=bestIdx(b=>b.cpPct||0,true);
  const bestTIR=bestIdx(b=>b.tirAvg||0,true);

  function cls(i,bestI,higherIsBetter=true){
    if(bonds.length<2)return'neutral';
    if(i===bestI)return higherIsBetter?'best':'worst';
    const worstI=bestIdx(i=>bonds.indexOf(bonds[i]),!higherIsBetter);
    return'neutral';
  }
  function highlight(i,bestI){return i===bestI?'var(--green3)':'var(--txt2)';}
  function hlLow(i,worstI){return i===worstI?'var(--amber3)':'var(--txt2)';}

  const cards=bonds.map((b,i)=>{
    const isShort=b.dir==='short';
    const sdv01=signedDV01(b);
    const metrics=[
      {sep:'// Identificación'},
      {l:'Tipo',v:`<span class="tag" style="background:${b.ac2||'#1a2540'};color:${b.ac3||'#e8eaf0'};border-color:${b.ac||'#1e2d4a'}">${b.tipo||'RF'}</span>`},
      {l:'Dirección',v:`<span style="color:${isShort?'var(--red3)':'var(--green3)'}">${isShort?'▼ Corto':'▲ Largo'}</span>`},
      {l:'Liquidación',v:fmtDate(b.liq)},
      {l:'Vencimiento',v:fmtDate(b.venc)},
      {l:'Próx. cupón',v:fmtDate(b.nextCupon)},
      {l:'Cupones rest.',v:b.cupsRem||'—',color:i===bestCups?'var(--green3)':'var(--txt)'},
      {sep:'// Precio y Cupón'},
      {l:'TIR negociación',v:b.tirAvg>0?pct(b.tirAvg*100,4):'—',color:i===bestTIR?'var(--green3)':'var(--txt)'},
      {l:'Tasa cupón',v:pct(b.cpPct||0,2),color:i===bestCpPct?'var(--amber3)':'var(--txt)'},
      {l:'Precio sucio',v:pct(b.priceRnd||0,4),color:i===bestPrice?'var(--green3)':i===worstPrice?'var(--amber3)':'var(--txt)'},
      {l:'Precio limpio',v:pct(b.pl||0,4)},
      {l:'Interés corrido',v:pct(b.ic||0,4),color:i===bestIC?'var(--amber3)':'var(--txt)'},
      {sep:'// Tamaño posición'},
      {l:'Nominal',v:fmtM(b.nom||0)},
      {l:'Valor giro',v:fmtM(b.vGiro||0),color:'var(--purple3)'},
      {sep:'// Riesgo'},
      {l:'D. Macaulay',v:fmt(b.dmac||0,4)},
      {l:'D. Modificada',v:fmt(b.dmod||0,4),color:i===bestDmod?'var(--amber3)':'var(--txt)'},
      {l:'Convexidad',v:fmt(b.conv||0,4),color:i===bestConv?'var(--green3)':'var(--txt)'},
      {l:'DV01 (±)',v:(sdv01>=0?'+':'')+fmtP(sdv01),color:sdv01>=0?'var(--green3)':'var(--red3)'},

    ];

    const rows=metrics.map(m=>{
      if(m.sep)return`<div class="compare-sep">${m.sep}</div>`;
      return`<div class="compare-row">
        <span class="compare-lbl">${m.l}</span>
        <span class="compare-val" style="color:${m.color||'var(--txt)'}">${m.v}</span>
      </div>`;
    }).join('');

    return`<div class="compare-card" style="border-color:${b.ac||'var(--border)'}">
      <div class="compare-card-hdr" style="background:rgba(0,0,0,.2)">
        <div class="bond-type" style="background:${b.ac2||'#1a2540'};border-color:${b.ac||'#1e2d4a'};color:${b.ac3||'#e8eaf0'};width:28px;height:28px;font-size:8px;border-radius:4px;border:1px solid;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">${b.tipo||'RF'}</div>
        <div style="min-width:0">
          <div style="font-size:10px;font-weight:700;color:${b.ac3||'var(--txt)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.label||'Bono'}</div>
          <div style="font-size:9px;color:var(--txt3)">${isShort?'▼ Corto':'▲ Largo'} · ${fmtM(b.nom||0)}</div>
        </div>
      </div>
      <div class="compare-card-body">${rows}</div>
    </div>`;
  }).join('');

  // Highlights table compacta
  function bLabel(i){return bonds[i]?`<span style="color:${bonds[i].ac3||'var(--purple3)'};font-weight:700">${bonds[i].label||'—'}</span>`:'—';}
  const worstDmod=bestIdx(b=>b.dmod||0,false);
  const worstConv=bestIdx(b=>b.conv||0,false);

  $('main-content').innerHTML=`
    <div class="card">
      <div class="c-hdr">⚖️ ${pf.name} · Comparativa de bonos (${bonds.length})</div>
      <div class="c-body" style="padding:10px">
        <div class="compare-grid">${cards}</div>
      </div>
    </div>
    <div class="card">
      <div class="c-hdr">🏆 Destacados por métrica</div>
      <div class="c-body" style="padding:0">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
          <table class="ft" style="border-right:1px solid var(--border)">
            <thead><tr><th style="text-align:left">Métrica</th><th style="text-align:left">Mayor</th></tr></thead>
            <tbody>
              <tr><td style="color:var(--txt3)">D. Modificada</td><td>${bLabel(bestDmod)}</td></tr>
              <tr><td style="color:var(--txt3)">Convexidad</td><td>${bLabel(bestConv)}</td></tr>
              <tr><td style="color:var(--txt3)">DV01 bruto</td><td>${bLabel(bestDV01)}</td></tr>
              <tr><td style="color:var(--txt3)">Precio sucio</td><td>${bLabel(bestPrice)}</td></tr>
              <tr><td style="color:var(--txt3)">Tasa cupón</td><td>${bLabel(bestCpPct)}</td></tr>
              <tr><td style="color:var(--txt3)">Interés corrido</td><td>${bLabel(bestIC)}</td></tr>
              <tr><td style="color:var(--txt3)">Más cupones rest.</td><td>${bLabel(bestCups)}</td></tr>
            </tbody>
          </table>
          <table class="ft">
            <thead><tr><th style="text-align:left">Métrica</th><th style="text-align:left">Menor</th></tr></thead>
            <tbody>
              <tr><td style="color:var(--txt3)">D. Modificada</td><td>${bLabel(worstDmod)}</td></tr>
              <tr><td style="color:var(--txt3)">Convexidad</td><td>${bLabel(worstConv)}</td></tr>
              <tr><td style="color:var(--txt3)">Precio sucio más bajo</td><td>${bLabel(worstPrice)}</td></tr>
              <tr><td style="color:var(--txt3)">Menos cupones</td><td>${bLabel(bestIdx(b=>b.cupsRem||999,false))}</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

// ── ESTRATEGIA RELATIVA ───────────────────────────────────────
let _estChart=null;

function buildEstrategiaCard(bonds){
  if(!bonds||!bonds.length)return'';
  const hoy=new Date();
  function plazo(iso){return Math.max(0.01,(new Date(iso)-hoy)/(365.25*24*3600*1000));}

  // Estado inicial: dirección del portafolio, escala 100%
  const state=bonds.map((b,i)=>({
    dir:b.dir||'long', scale:100,
    plazo:plazo(b.venc||b.nextCupon||''),
    yield:(b.tirAvg||0)*100
  }));
  window._estState=state;
  window._estBonds=bonds;

  const tipoColor={TF:'#f59e0b',IBR:'#3b82f6',IPC:'#10b981',UVR:'#8b5cf6'};
  const rows=bonds.map((b,i)=>{
    const tc=tipoColor[b.tipo]||'#8892a4';
    const dc=state[i].dir==='long'?'est-dir-l':'est-dir-s';
    return`<tr>
      <td style="text-align:left">
        <span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:${tc}22;color:${tc};border:1px solid ${tc}66">${b.tipo||'—'}</span>
      </td>
      <td style="text-align:left;color:var(--txt2)">${fmtDate(b.venc)}</td>
      <td style="text-align:left">
        <button id="est-dir-${i}" class="est-dir-btn ${dc}" onclick="toggleEstDir(${i})">${state[i].dir==='long'?'▲ Largo':'▼ Corto'}</button>
      </td>
      <td>${fmt(b.dmod||0,3)}</td>
      <td style="text-align:right">
        <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end">
          <input type="number" id="est-scale-${i}" value="100" min="0" max="200" step="10"
            oninput="onEstSlider()" style="width:60px;padding:2px 5px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;color:var(--amber3);background:var(--bg2);font-family:monospace;text-align:right">
          <span style="font-size:10px;color:var(--amber3)">%</span>
        </div>
      </td>
      <td id="est-vg-${i}" style="color:var(--blue3)">${fmtM((b.vGiro||0))}</td>
      <td id="est-dv01-${i}" style="color:var(--green3)">${fmtM(Math.abs(b.dv01||0))}</td>
    </tr>`;
  }).join('');

        <span style="font-size:9px;color:var(--txt3);margin-left:6px">${b.label||fmtDate(b.venc)} · D* ${fmt(b.dmod||0,2)}</span>

  return`<div class="card" style="border-color:var(--amber)">

    <div class="c-body">
      <div class="tscroll" style="margin-bottom:12px">
        <table class="ft">

          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">// Simulador de curva</div>
      <div style="position:relative;height:300px;margin-bottom:12px"><canvas id="est-canvas"></canvas></div>

      </div>
      ${sliders}

        </div>
        <button onclick="resetEstrategia()" style="padding:4px 12px;font-size:10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--txt3);cursor:pointer;font-family:inherit">↺ Reset</button>

}

function initEstrategiaChart(){
  const bonds=window._estBonds;const state=window._estState;
  if(!bonds||!bonds.length)return;
  const ctx=$('est-canvas');if(!ctx)return;
  try{if(_estChart)_estChart.destroy();}catch(e){}

  const hoy=new Date();
  function plazo(iso){return Math.max(0.01,(new Date(iso)-hoy)/(365.25*24*3600*1000));}

  const tipoColor={TF:'#f59e0b',IBR:'#3b82f6',IPC:'#10b981',UVR:'#8b5cf6'};
  // Si tirAvg=0 (bond guardado antes del fix), usar cpPct como proxy del yield
  const refPts=bonds.map((b,i)=>{
    const y=(b.tirAvg&&b.tirAvg>0)?(b.tirAvg*100):(b.cpPct||0);
    return{x:plazo(b.venc||''),y};
  });
  window._estRef=refPts;
  const sinYield=bonds.some(b=>!(b.tirAvg&&b.tirAvg>0));

  const ptColors=bonds.map((b,i)=>state[i].dir==='long'?'#22c55e':'#ef4444');
  const ptSim=bonds.map((b,i)=>state[i].dir==='long'?'#86efac':'#fca5a5');

  function buildChart(curvaPts){
    try{if(_estChart)_estChart.destroy();}catch(e){}
    _estChart=new Chart(ctx,{type:'scatter',
      data:{datasets:[
        {label:'Curva TF Colombia',data:curvaPts,type:'line',borderColor:'rgba(148,163,184,.55)',borderWidth:1.8,pointRadius:3,pointBackgroundColor:'rgba(148,163,184,.4)',fill:false,tension:.35,showLine:true,order:3},
        {label:'Posición actual',data:refPts.map(p=>({x:p.x,y:p.y})),backgroundColor:ptColors,pointRadius:5,pointHoverRadius:7,order:1},
        {label:'Posición simulada',data:refPts.map(p=>({x:p.x,y:p.y})),backgroundColor:ptSim,pointStyle:'triangle',pointRadius:6,order:2}
      ]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:80},
        plugins:{legend:{display:true,position:'top',labels:{color:'#8892a4',font:{size:10},boxWidth:12}},
          tooltip:{callbacks:{label:c=>{
            if(c.datasetIndex===0)return`Curva: ${fmt(c.parsed.y,2)}%`;
            const b=bonds[c.dataIndex];if(!b)return'';
            const bp=parseInt(($('est-bp-'+c.dataIndex)||{value:'0'}).value);
            return c.datasetIndex===1?`${b.label||fmtDate(b.venc)}: ${fmt(c.parsed.y,2)}%`:`Simulado: ${fmt(c.parsed.y,2)}% (${bp>0?'+':''}${bp}bp)`;
          }}}},
        scales:{
          x:{title:{display:true,text:'Plazo (años)',color:'#4a5568',font:{size:10}},ticks:{color:'#4a5568',font:{size:9}},grid:{color:'rgba(255,255,255,.03)'},min:0,suggestedMax:25},
          y:{title:{display:true,text:'Yield / TIR EA (%)',color:'#4a5568',font:{size:10}},ticks:{color:'#4a5568',font:{size:9},callback:v=>v.toFixed(1)+'%'},grid:{color:'rgba(255,255,255,.03)'}}
        }},
      plugins:[{id:'estLabels',afterDraw(chart){
        const d=window._estBonds;if(!d)return;
        const ds=chart.data.datasets[2];if(!ds||!ds.data)return;
        const meta=chart.getDatasetMeta(2);if(!meta)return;
        const ctx2=chart.ctx;
        meta.data.forEach((pt,i)=>{
          const bp=parseInt(($('est-bp-'+i)||{value:'0'}).value);if(bp===0)return;
          const b=bonds[i];const st=state[i];
          const sign=st.dir==='long'?1:-1;
          const scale=(()=>{const v=parseFloat(($('est-scale-'+i)||{value:'100'}).value);return(isNaN(v)?100:v)/100;})();
          let price2=parseFloat(b.priceRnd||100);if(price2<2)price2*=100;
          let nom=(b.nom||0);
          if(!nom&&b.dv01&&b.dmod)nom=Math.abs(b.dv01)*10000/(b.dmod*(price2/100));
          nom*=scale;
          const pl=(-(b.dmod||0)*(bp/10000)+0.5*(b.conv||0)*(bp/10000)**2)*(price2/100)*nom*sign;
          const col=st.dir==='long'?'#86efac':'#fca5a5';
          const lbl=`${bp>0?'+':''}${bp}bp  ${pl>=0?'+':''}${fmtM(pl)}`;
          ctx2.save();ctx2.font='bold 10px monospace';ctx2.fillStyle=col;ctx2.textAlign='center';
          ctx2.fillText(lbl,pt.x,pt.y-12);
          const rMeta=chart.getDatasetMeta(1);
          if(rMeta&&rMeta.data[i]){
            const rp=rMeta.data[i];
            ctx2.strokeStyle=col+'88';ctx2.lineWidth=1.5;ctx2.setLineDash([4,3]);
            ctx2.beginPath();ctx2.moveTo(rp.x,rp.y);ctx2.lineTo(pt.x,pt.y);ctx2.stroke();ctx2.setLineDash([]);
          }
          ctx2.restore();
        });
      }}]
    });
  }

  fetch('datos_curva.json').then(r=>{if(!r.ok)throw new Error();return r.json();})
    .then(curva=>{
      const pts=curva.filter(b=>b.plazo>0.05&&b.tir>0&&b.tir<30).sort((a,b)=>a.plazo-b.plazo).map(b=>({x:b.plazo,y:b.tir}));
      buildChart(pts.length>=2?pts:buildFallbackCurva(refPts));
    }).catch(()=>buildChart(buildFallbackCurva(refPts)));
}

function buildFallbackCurva(refPts){
  const sorted=[...refPts].sort((a,b)=>a.x-b.x);
  if(sorted.length<2)return sorted.map(p=>({x:p.x,y:p.y}));
  const pts=[];
  const slope=(sorted[1].y-sorted[0].y)/(sorted[1].x-sorted[0].x);
  for(let t=0.5;t<sorted[0].x;t+=0.5)pts.push({x:t,y:Math.max(0,sorted[0].y-slope*(sorted[0].x-t))});
  sorted.forEach(p=>pts.push({x:p.x,y:p.y}));
  const last=sorted[sorted.length-1],prev=sorted[sorted.length-2];
  const s2=(last.y-prev.y)/(last.x-prev.x);
  for(let t=last.x+0.5;t<=last.x+5;t+=0.5)pts.push({x:t,y:Math.max(0,last.y+s2*(t-last.x))});
  return pts;
}

function toggleEstDir(i){
  const state=window._estState;if(!state||!state[i])return;
  state[i].dir=state[i].dir==='long'?'short':'long';
  const btn=$('est-dir-'+i),sdir=$('est-sdir-'+i);
  const isL=state[i].dir==='long';
  if(btn){btn.className='est-dir-btn '+(isL?'est-dir-l':'est-dir-s');btn.textContent=isL?'▲ Largo':'▼ Corto';}
  if(sdir){sdir.textContent=isL?'▲ Largo':'▼ Corto';sdir.style.color=isL?'var(--green3)':'var(--red3)';}
  onEstSlider();
}

function onEstSlider(){
  const bonds=window._estBonds;const state=window._estState;const ref=window._estRef;
  if(!bonds||!state)return;
  let total=0;
  const simPts=[];
  bonds.forEach((b,i)=>{
    const bp=parseInt(($('est-bp-'+i)||{value:'0'}).value)||0;
    const scale=(()=>{const v=parseFloat(($('est-scale-'+i)||{value:'100'}).value);return(isNaN(v)?100:v)/100;})();
    const sign=state[i].dir==='long'?1:-1;
    let price=parseFloat(b.priceRnd||100);if(price<2)price*=100;
    // Si nom=0 (bonos guardados antes del fix), derivar de DV01
    let nom=(b.nom||0);
    if(!nom&&b.dv01&&b.dmod)nom=Math.abs(b.dv01)*10000/(b.dmod*(price/100));
    nom*=scale;
    const pl=(-(b.dmod||0)*(bp/10000)+0.5*(b.conv||0)*(bp/10000)**2)*(price/100)*nom*sign;
    total+=pl;
    const lblEl=$('est-bplbl-'+i);if(lblEl)lblEl.textContent=(bp>0?'+':'')+bp+'bp';
    const plEl=$('est-pl-'+i);
    if(plEl){plEl.textContent=(pl>=0?'+':'')+fmtM(pl);plEl.style.color=pl>=0?'var(--green3)':'var(--red3)';}
    const vg=(b.vGiro||0)*scale;
    const vgEl=$('est-vg-'+i);if(vgEl)vgEl.textContent=fmtM(vg);
    const dv01=Math.abs(b.dv01||0)*scale;
    const dv01El=$('est-dv01-'+i);if(dv01El)dv01El.textContent=fmtM(dv01);
    simPts.push(ref?{x:ref[i].x,y:ref[i].y+bp/100}:{x:0,y:0});
  });
  const netEl=$('est-net');
  if(netEl){netEl.textContent=(total>=0?'+':'')+fmtM(total);netEl.style.color=total>=0?'var(--green3)':'var(--red3)';}
  if(_estChart&&_estChart.data.datasets[2]){_estChart.data.datasets[2].data=simPts;_estChart.update('none');}
}

function resetEstrategia(){
  const bonds=window._estBonds;if(!bonds)return;
  bonds.forEach((_,i)=>{
    const bp=$('est-bp-'+i);if(bp)bp.value=0;
    const sc=$('est-scale-'+i);if(sc)sc.value=100;
    const lbl=$('est-bplbl-'+i);if(lbl)lbl.textContent='0bp';
    const pl=$('est-pl-'+i);if(pl){pl.textContent='—';pl.style.color='var(--txt3)';}
  });
  const netEl=$('est-net');if(netEl){netEl.textContent='$0';netEl.style.color='var(--txt)';}
  const ref=window._estRef;
  if(_estChart&&ref){_estChart.data.datasets[2].data=ref.map(p=>({x:p.x,y:p.y}));_estChart.update('none');}
}

  let arr=[...items]; while(arr.length<16) arr=[...arr,...items];
  return arr.map(i=>`<span class="tick-item"><span class="tick-dot ${i.up?'up':'dn'}"></span><span class="tick-name">${i.n}</span>&nbsp;<span class="tick-val">${i.v}</span>&nbsp;<span class="tick-chg ${i.up?'up':'dn'}">${i.c}</span></span>`).join('');
}

const YAHOO_PF=[
  {sym:'USDCOP=X',n:'USD/COP',dec:0},{sym:'EURUSD=X',n:'EUR/USD',dec:4},
  {sym:'CL=F',n:'WTI',dec:2,suf:' USD'},{sym:'BZ=F',n:'Brent',dec:2,suf:' USD'},
  {sym:'GC=F',n:'Oro',dec:0,suf:' USD'},{sym:'^GSPC',n:'S&P 500',dec:0},
  {sym:'^IXIC',n:'Nasdaq',dec:0},{sym:'^VIX',n:'VIX',dec:2},
  {sym:'BTC-USD',n:'BTC',dec:0,suf:' USD'},{sym:'DX-Y.NYB',n:'DXY',dec:2},
  {sym:'^TNX',n:'UST 10Y',dec:2,suf:'%'},
];
async function fetchOnePF(sym){
  for(const base of['https://query1.finance.yahoo.com','https://query2.finance.yahoo.com']){
    try{
      const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(base+'/v8/finance/chart/'+sym+'?interval=1d&range=1d')}`);
      if(!r.ok) continue;
      const meta=((await r.json())?.chart?.result?.[0]?.meta);
      if(!meta?.regularMarketPrice) continue;
      const price=meta.regularMarketPrice,prev=meta.regularMarketPreviousClose||price,chg=price-prev;
      return{price,chg,chgPct:prev>0?(chg/prev)*100:0};
    }catch{continue;}
  }
  return null;
}
async function loadTickerPF(){
  const results=await Promise.allSettled(YAHOO_PF.map(s=>fetchOnePF(s.sym)));
  const items=[];
  results.forEach((r,i)=>{
    const cfg=YAHOO_PF[i];
    if(r.status==='fulfilled'&&r.value){
      const{price,chg,chgPct}=r.value; const up=chg>=0;
      items.push({n:cfg.n,v:price.toLocaleString('es-CO',{minimumFractionDigits:cfg.dec,maximumFractionDigits:cfg.dec})+(cfg.suf||''),up,c:(up?'+':'')+chgPct.toFixed(2)+'%'});
    }
  });
  if(items.length>=4){setTickerPF(items);$t('tickerStatus').textContent='↺ '+new Date().toLocaleTimeString('es-CO',{timeZone:'America/Bogota',hour12:false});$t('tickerStatus').style.color='var(--green3)';}
}

function isMarketOpen(m,now){
  const l=new Date(now.toLocaleString('en-US',{timeZone:m.tz}));
  if(!m.days.includes(l.getDay())) return false;
  const mins=l.getHours()*60+l.getMinutes();
  return mins>=m.open[0]*60+m.open[1] && mins<m.close[0]*60+m.close[1];
}
function renderClocks(){
  const now=new Date(), wrap=document.getElementById('world-clocks');
  if(!wrap) return;

    const t=now.toLocaleTimeString('es-CO',{timeZone:m.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

    return`<div style="display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0">

  }).join(`<div style="width:1px;height:28px;background:var(--border);flex-shrink:0"></div>`);
}
